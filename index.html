<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قوانين ضرائب السودان</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:#F0F4F8;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.card{
  background:white;
  border-radius:24px;
  padding:40px 32px;
  text-align:center;
  box-shadow:0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  max-width:340px;width:100%;
}
.app-icon{
  width:100px;height:100px;
  border-radius:22px;
  object-fit:contain;
  margin-bottom:20px;
  box-shadow:0 4px 16px rgba(0,0,0,0.12);
}
.app-name{
  font-size:20px;font-weight:700;
  color:#1A2B45;
  margin-bottom:28px;
  line-height:1.4;
}
.dl-btn{
  display:inline-flex;align-items:center;justify-content:center;
  gap:10px;
  background:#22C55E;
  color:white;
  border:none;border-radius:50px;
  padding:15px 40px;
  font-size:17px;font-weight:700;
  cursor:pointer;
  text-decoration:none;
  box-shadow:0 4px 16px rgba(34,197,94,0.35);
  transition:all 0.2s;
  width:100%;
}
.dl-btn:active{transform:scale(0.97);background:#16A34A;}
.dl-btn svg{width:20px;height:20px;fill:white;flex-shrink:0;}
</style>
</head>
<body>
<div class="card">
  <img class="app-icon" src="logo.png" alt="قوانين ضرائب السودان"
       onerror="this.style.display='none'">
  <div class="app-name">قوانين ضرائب السودان</div>
  <a class="dl-btn" href="app.apk" download="قوانين_ضرائب_السودان.apk">
    <svg viewBox="0 0 24 24"><path d="M12 16l-6-6h4V4h4v6h4l-6 6zm-7 4h14v-2H5v2z"/></svg>
    تحميل التطبيق
  </a>
</div>
</body>
</html>
